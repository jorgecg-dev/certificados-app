{% extends "base.html" %}

{% block contenido %}

<div class="card-form">
    <h2>CERTIFICADOS DOBLE CARA</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label>Plantilla frontal</label>
            <input type="file" name="frontal" required>
        </div>

        <div class="form-group">
            <label>Plantilla trasera</label>
            <input type="file" name="trasero" required>
        </div>

        <div class="form-group">
            <label>Archivo Excel</label>
            <input type="file" name="excel" required>
        </div>

        <div class="form-group">
            <label>Fotos de participantes (opcional)</label>
            <input type="file" name="fotos[]" multiple accept="image/*">
        </div>

        <button type="submit" class="btn-guardar">
            Generar certificados
        </button>

    </form>
</div>

{% endblock %}
